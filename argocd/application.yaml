apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flights-api
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.com/mohammedkhaiserulla/flights-platform.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: flights-team

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true